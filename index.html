<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Circumbinary Planet System</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}
canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const cx = canvas.width/2;
const cy = canvas.height/2;

let t = 0;

function draw(){

    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    t += 0.01;

    /* Binary stars */

    let starOrbit = 60;

    let x1 = cx + starOrbit*Math.cos(t);
    let y1 = cy + starOrbit*Math.sin(t);

    let x2 = cx - starOrbit*Math.cos(t);
    let y2 = cy - starOrbit*Math.sin(t);

    /* Circumbinary planet */

    let planetOrbit = 250;

    let xp = cx + planetOrbit*Math.cos(t*0.35);
    let yp = cy + planetOrbit*Math.sin(t*0.35);

    /* Draw stars */

    ctx.beginPath();
    ctx.arc(x1,y1,12,0,2*Math.PI);
    ctx.fillStyle="orange";
    ctx.fill();

    ctx.beginPath();
    ctx.arc(x2,y2,12,0,2*Math.PI);
    ctx.fillStyle="yellow";
    ctx.fill();

    /* Draw planet */

    ctx.beginPath();
    ctx.arc(xp,yp,7,0,2*Math.PI);
    ctx.fillStyle="cyan";
    ctx.fill();

    /* Orbit guide */

    ctx.beginPath();
    ctx.arc(cx,cy,planetOrbit,0,2*Math.PI);
    ctx.strokeStyle="rgba(255,255,255,0.15)";
    ctx.stroke();

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
